services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-frost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frost}
      POSTGRES_DB: ${POSTGRES_DB:-frost}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-18:/var/lib/postgresql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frost} -d ${POSTGRES_DB:-frost}"]
      interval: 5s
      timeout: 5s
      retries: 10

  coordinator:
    image: rust:1.94
    working_dir: /workspace/backend
    command: cargo run -p coordinator
    environment:
      COORDINATOR_HOST: 0.0.0.0
      COORDINATOR_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://frost:frost@postgres:5432/frost}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      NODE_A_URL: http://node-a:8081
      NODE_B_URL: http://node-b:8081
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/workspace/backend/target
    depends_on:
      postgres:
        condition: service_healthy
      node-a:
        condition: service_started
      node-b:
        condition: service_started

  node-a:
    image: rust:1.94
    working_dir: /workspace/backend
    command: cargo run -p tss-node
    environment:
      NODE_ID: node-a
      TSS_NODE_HOST: 0.0.0.0
      TSS_NODE_PORT: 8081
      DATABASE_URL: ${DATABASE_URL:-postgres://frost:frost@postgres:5432/frost}
      COORDINATOR_URL: http://coordinator:8080
    volumes:
      - ./backend:/workspace/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/workspace/backend/target
    depends_on:
      postgres:
        condition: service_healthy

  node-b:
    image: rust:1.94
    working_dir: /workspace/backend
    command: cargo run -p tss-node
    environment:
      NODE_ID: node-b
      TSS_NODE_HOST: 0.0.0.0
      TSS_NODE_PORT: 8081
      DATABASE_URL: ${DATABASE_URL:-postgres://frost:frost@postgres:5432/frost}
      COORDINATOR_URL: http://coordinator:8080
    volumes:
      - ./backend:/workspace/backend
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - backend-target:/workspace/backend/target
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_COORDINATOR_URL: ${NEXT_PUBLIC_COORDINATOR_URL:-http://localhost:8080}
      COORDINATOR_INTERNAL_URL: http://coordinator:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/workspace/frontend
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      - coordinator

volumes:
  postgres-data-18:
  cargo-registry:
  cargo-git:
  backend-target:
  frontend-node-modules:

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-alpha.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Publish draft GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release metadata
        run: node scripts/verify-release-metadata.mjs --tag "${{ steps.release-tag.outputs.tag }}"

      - name: Extract release notes
        run: node scripts/extract-release-notes.mjs "${{ steps.release-tag.outputs.tag }}" > release-notes.md

      - name: Create draft release
        run: gh release create "${{ steps.release-tag.outputs.tag }}" --draft --title "${{ steps.release-tag.outputs.tag }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

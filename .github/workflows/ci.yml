name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase-0-docs:
    name: Phase 0 docs and repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository hygiene
        run: ./scripts/verify-phase.sh 0

  frontend-static:
    name: Frontend static checks
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
